name: actionlint

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.4.0
      - uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1.72.0
        with:
          reporter: github-check
          # SHARED_OP_SERVICE_ACCOUNT_TOKEN is supplied through secrets: inherit,
          # so it is intentionally absent from workflow_call.secrets.
          actionlint_flags: >-
            -ignore 'property "shared_op_service_account_token" is not defined in object type'
