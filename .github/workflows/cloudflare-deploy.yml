name: Cloudflare deploy

on:
  workflow_call:
    inputs:
      vault:
        description: Project vault named webops-prod-<project> containing Worker secrets. The caller OP token must also be scoped to webops-prod-shared for shared Cloudflare credentials.
        required: true
        type: string
      secrets:
        description: Multiline KEY=item/field entries resolved from the project vault (or a full op://... reference) and uploaded to the Worker.
        required: false
        type: string
        default: ""
    secrets:
      OP_SERVICE_ACCOUNT_TOKEN:
        description: 1Password service account token supplied by the caller and scoped to webops-prod-shared and the project vault named in vault.
        required: true

jobs:
  deploy:
    name: Deploy to Cloudflare
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout app repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Validate deployment inputs
        env:
          VAULT: ${{ inputs.vault }}
        run: |
          set -euo pipefail
          if [[ "$VAULT" != webops-prod-* || "$VAULT" == webops-prod-shared ]]; then
            echo "::error::vault must name a project vault in the form webops-prod-<project>" >&2
            exit 1
          fi

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prepare project secret references
        env:
          OP_ENV: ${{ inputs.secrets }}
          VAULT: ${{ inputs.vault }}
        run: |
          set -euo pipefail
          keys_file="$RUNNER_TEMP/cloudflare-secret-keys"
          : > "$keys_file"

          while IFS= read -r line || [[ -n "$line" ]]; do
            line="${line//$'\r'/}"
            [[ "$line" =~ ^[[:space:]]*$ ]] && continue
            [[ "$line" =~ ^[[:space:]]*# ]] && continue
            if [[ "$line" != *=* ]]; then
              echo "::error::Invalid secrets entry (expected KEY=item/field or op://...): $line" >&2
              exit 1
            fi

            key="${line%%=*}"
            key="${key//[[:space:]]/}"
            reference="${line#*=}"
            if [[ -z "$key" || -z "$reference" ]]; then
              echo "::error::Invalid secrets entry (expected KEY=item/field or op://...): $line" >&2
              exit 1
            fi
            case "$key" in
              CLOUDFLARE_API_TOKEN|CLOUDFLARE_ACCOUNT_ID)
                echo "::error::${key} is managed by the reusable workflow and must not be listed in secrets" >&2
                exit 1
                ;;
            esac

            if [[ "$reference" == op://* ]]; then
              printf '%s=%s\n' "$key" "$reference" >> "$GITHUB_ENV"
            else
              printf '%s=op://%s/%s\n' "$key" "$VAULT" "$reference" >> "$GITHUB_ENV"
            fi
            printf '%s\n' "$key" >> "$keys_file"
          done <<< "$OP_ENV"

      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@3a12b0ab99d9cd590a3e9b5a90ea017210ed9556 # v4.0.1
        with:
          export-env: true
          version: 2.30.3
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          CLOUDFLARE_API_TOKEN: op://webops-prod-shared/CLOUDFLARE/CLOUDFLARE_API_TOKEN
          CLOUDFLARE_ACCOUNT_ID: op://webops-prod-shared/CLOUDFLARE/CLOUDFLARE_ACCOUNT_ID

      - name: Validate Cloudflare credentials
        run: |
          set -euo pipefail
          for var in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID; do
            if [[ -z "${!var:-}" ]]; then
              echo "::error::${var} must resolve from webops-prod-shared/CLOUDFLARE" >&2
              exit 1
            fi
          done

      - name: Upload secrets to Cloudflare
        run: |
          set -euo pipefail
          keys_file="$RUNNER_TEMP/cloudflare-secret-keys"
          if [[ ! -s "$keys_file" ]]; then
            echo "No Worker secrets declared; skipping secret bulk"
            exit 0
          fi

          secrets='{}'
          while IFS= read -r key || [[ -n "$key" ]]; do
            value="${!key:-}"
            if [[ -z "$value" ]]; then
              echo "::error::Secret ${key} was not loaded into the environment" >&2
              exit 1
            fi
            secrets="$(jq --arg key "$key" --arg value "$value" '. + {($key): $value}' <<< "$secrets")"
          done < "$keys_file"

          printf '%s\n' "$secrets" | bunx wrangler secret bulk

      - name: Deploy Worker
        run: bun run deploy
