name: Vercel deploy with 1Password

on:
  workflow_call:
    inputs:
      VERCEL_PROJECT_ID:
        description: Vercel project id value or op:// reference.
        required: true
        type: string
      secrets:
        description: Multiline KEY=value or KEY=op://... entries to load from 1Password for the Vercel build.
        required: false
        type: string
        default: ""
      export-env:
        description: Export loaded 1Password values to later workflow steps.
        required: false
        type: boolean
        default: true
    outputs:
      deployment-url:
        description: URL returned by vercel deploy.
        value: ${{ jobs.deploy.outputs.deployment-url }}

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      deployment-url: ${{ steps.deploy.outputs.deployment-url }}
    steps:
      - name: Checkout app repository
        uses: actions/checkout@v4

      - name: Configure 1Password service account
        uses: 1password/load-secrets-action/configure@v4
        with:
          service-account-token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy to Vercel
        id: deploy
        env:
          OP_ENV: ${{ inputs.secrets }}
          EXPORT_ENV: ${{ inputs.export-env }}
          VERCEL_TOKEN_REF: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID_REF: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID_REF: ${{ inputs.VERCEL_PROJECT_ID }}
        run: |
          set -euo pipefail

          env_file="$RUNNER_TEMP/vercel-1password.env"
          {
            printf 'VERCEL_TOKEN=%s\n' "$VERCEL_TOKEN_REF"
            printf 'VERCEL_ORG_ID=%s\n' "$VERCEL_ORG_ID_REF"
            printf 'VERCEL_PROJECT_ID=%s\n' "$VERCEL_PROJECT_ID_REF"
            printf '%s\n' "$OP_ENV"
          } > "$env_file"
          export ENV_FILE="$env_file"

          op run --env-file "$env_file" -- bash -euo pipefail <<'EOF'
          if [[ -z "${VERCEL_TOKEN:-}" || -z "${VERCEL_ORG_ID:-}" || -z "${VERCEL_PROJECT_ID:-}" ]]; then
            echo "::error::VERCEL_TOKEN, VERCEL_ORG_ID, and VERCEL_PROJECT_ID are required" >&2
            exit 1
          fi

          while IFS= read -r line || [[ -n "$line" ]]; do
            line="${line//$'\r'/}"
            [[ "$line" =~ ^[[:space:]]*$ ]] && continue
            [[ "$line" =~ ^[[:space:]]*# ]] && continue

            line="${line#"${line%%[![:space:]]*}"}"
            line="${line#export }"
            key="${line%%=*}"
            key="${key%"${key##*[![:space:]]}"}"

            [[ "$key" =~ ^[A-Za-z_][A-Za-z0-9_]*$ ]] || continue

            if [[ "$EXPORT_ENV" == "true" ]]; then
              {
                printf '%s<<__VERCEL_1PASSWORD_ENV__\n' "$key"
                printf '%s\n' "${!key-}"
                printf '__VERCEL_1PASSWORD_ENV__\n'
              } >> "$GITHUB_ENV"
            fi
          done < "$ENV_FILE"

          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          vercel build --prod --token="$VERCEL_TOKEN"
          deployment_url=$(vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN")
          echo "deployment-url=$deployment_url" >> "$GITHUB_OUTPUT"
          echo "Deployment URL: $deployment_url"
          EOF
