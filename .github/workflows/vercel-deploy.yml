name: Vercel deploy

on:
  workflow_call:
    inputs:
      vault:
        description: Project vault named webops-prod-<project> containing the Vercel project ID and app secrets. The caller OP token must also be scoped to webops-prod-shared for shared Vercel credentials.
        required: true
        type: string
      secrets:
        description: Multiline KEY=item/field entries resolved from the project vault (or a full op://... reference) for the Vercel build.
        required: false
        type: string
        default: ""
      environment:
        description: The environment to deploy to (preview or production).
        required: false
        type: string
        default: preview
      workflows-ref:
        description: Ref of yearn/yearn-gha to check out for helper scripts. Pass the same ref pinned in uses; defaults to github.job_workflow_sha, which GitHub leaves empty on some runs (falling back to main).
        required: false
        type: string
        default: ""
    secrets:
      OP_SERVICE_ACCOUNT_TOKEN:
        description: 1Password service account token supplied by the caller and scoped to webops-prod-shared and the project vault named in vault.
        required: true
    outputs:
      deployment-url:
        description: Preview or production URL returned by Vercel.
        value: ${{ jobs.deploy.outputs.deployment-url }}

# Serialize the whole workflow (env sync + build + deploy) per project and
# environment. Job-level concurrency would release between build and deploy.
concurrency:
  group: vercel-deploy-${{ inputs.vault }}-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  # Builds untrusted app code. May use VERCEL_TOKEN only in steps that run
  # before the build. After build, only artifact upload runs — no credentialed
  # deploy/scripts on this runner (app code could have poisoned the disk).
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout app repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # Nothing after checkout needs git credentials, and the app build
          # must not be able to read the GitHub token from .git/config.
          persist-credentials: false

      # bun installs the Vercel CLI and provides the runtime for bun-managed
      # apps built locally by `vercel build`.
      - name: Set up bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Install Vercel CLI
        run: bun install -g --ignore-scripts vercel@56.5.0

      # The app checkout above owns the workspace root, so this repo's helper
      # scripts are checked out to a subdirectory at the same ref as this
      # workflow file.
      - name: Checkout workflow repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          repository: yearn/yearn-gha
          ref: ${{ inputs.workflows-ref || github.job_workflow_sha }}
          path: .yearn-gha
          persist-credentials: false

      - name: Validate deployment inputs
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          VAULT: ${{ inputs.vault }}
        run: node .yearn-gha/scripts/validate-deployment-inputs.mjs

      - name: Prepare project secret references
        id: prepare-project-secret-references
        env:
          OP_ENV: ${{ inputs.secrets }}
          VAULT: ${{ inputs.vault }}
        run: node .yearn-gha/scripts/prepare-project-secret-references.mjs

      # export-env is off on purpose: exported env vars would be inherited by
      # `vercel build`, which runs the app's install/build scripts. Secrets are
      # exposed as step outputs instead and scoped per-step below.
      - name: Load secrets from 1Password
        id: op
        uses: 1password/load-secrets-action@3a12b0ab99d9cd590a3e9b5a90ea017210ed9556 # v4.0.1
        with:
          export-env: false
          version: 2.30.3
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          VERCEL_TOKEN: op://webops-prod-shared/vercel/VERCEL_TOKEN
          VERCEL_ORG_ID: op://webops-prod-shared/vercel/VERCEL_ORG_ID
          VERCEL_PROJECT_ID: ${{ steps.prepare-project-secret-references.outputs.vercel-project-id }}

      - name: Validate Vercel credentials
        env:
          VERCEL_TOKEN: ${{ steps.op.outputs.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ steps.op.outputs.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ steps.op.outputs.VERCEL_PROJECT_ID }}
        run: |
          set -euo pipefail
          for var in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID; do
            if [[ -z "${!var:-}" ]]; then
              echo "::error::${var} must resolve from its configured 1Password vault" >&2
              exit 1
            fi
          done

      # 1Password is the source of truth: push each loaded secret to the
      # Vercel project env for the target environment so `vercel pull` below
      # fetches values consistent with this deploy.
      - name: Push env vars to Vercel
        env:
          OP_ENV: ${{ inputs.secrets }}
          ENVIRONMENT: ${{ inputs.environment }}
          VERCEL_TOKEN: ${{ steps.op.outputs.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ steps.op.outputs.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ steps.op.outputs.VERCEL_PROJECT_ID }}
          SECRETS_JSON: ${{ toJSON(steps.op.outputs) }}
        run: node .yearn-gha/scripts/push-env-vars-to-vercel.mjs

      - name: Pull Vercel project settings
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          VERCEL_TOKEN: ${{ steps.op.outputs.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ steps.op.outputs.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ steps.op.outputs.VERCEL_PROJECT_ID }}
        run: vercel pull --yes --environment="$ENVIRONMENT" --token="$VERCEL_TOKEN"

      # Runs the app's install/build scripts, so no Vercel or GitHub
      # credentials may be present in this step's environment. The script
      # also deletes the op:// reference vars that GITHUB_ENV leaks into the
      # job env, so app env vars come only from the `vercel pull` output above.
      - name: Build
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          OP_ENV: ${{ inputs.secrets }}
        run: node .yearn-gha/scripts/run-vercel-build.mjs

      # Only prebuilt output + project link — never env files (may contain
      # NEXT_PUBLIC values) or anything the deploy job would execute.
      - name: Upload prebuilt artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: vercel-prebuilt
          path: |
            .vercel/output
            .vercel/project.json
          # The build output contains dotfiles the deploy needs (e.g.
          # functions/*.func/.vc-config.json), which upload-artifact skips
          # by default.
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 1

  # Clean runner. Reinstall tools from the registry and re-checkout helpers —
  # never execute scripts or binaries produced by the build job.
  deploy:
    name: Deploy to Vercel
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    outputs:
      deployment-url: ${{ steps.deploy.outputs.deployment-url }}
    steps:
      - name: Set up bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Install Vercel CLI
        run: bun install -g --ignore-scripts vercel@56.5.0

      - name: Checkout workflow repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          repository: yearn/yearn-gha
          ref: ${{ inputs.workflows-ref || github.job_workflow_sha }}
          path: .yearn-gha
          persist-credentials: false

      # upload-artifact roots the archive at the paths' common ancestor
      # (.vercel), so extract back into .vercel to restore output/ and
      # project.json where the CLI expects them.
      - name: Download prebuilt artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: vercel-prebuilt
          path: .vercel

      - name: Validate deployment inputs
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          VAULT: ${{ inputs.vault }}
        run: node .yearn-gha/scripts/validate-deployment-inputs.mjs

      # Deploy only needs Vercel credentials (project id + token), not app secrets.
      - name: Prepare project secret references
        id: prepare-project-secret-references
        env:
          OP_ENV: ""
          VAULT: ${{ inputs.vault }}
        run: node .yearn-gha/scripts/prepare-project-secret-references.mjs

      - name: Load secrets from 1Password
        id: op
        uses: 1password/load-secrets-action@3a12b0ab99d9cd590a3e9b5a90ea017210ed9556 # v4.0.1
        with:
          export-env: false
          version: 2.30.3
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          VERCEL_TOKEN: op://webops-prod-shared/vercel/VERCEL_TOKEN
          VERCEL_ORG_ID: op://webops-prod-shared/vercel/VERCEL_ORG_ID
          VERCEL_PROJECT_ID: ${{ steps.prepare-project-secret-references.outputs.vercel-project-id }}

      - name: Validate Vercel credentials
        env:
          VERCEL_TOKEN: ${{ steps.op.outputs.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ steps.op.outputs.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ steps.op.outputs.VERCEL_PROJECT_ID }}
        run: |
          set -euo pipefail
          for var in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID; do
            if [[ -z "${!var:-}" ]]; then
              echo "::error::${var} must resolve from its configured 1Password vault" >&2
              exit 1
            fi
          done

      - name: Deploy to Vercel
        id: deploy
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          VERCEL_TOKEN: ${{ steps.op.outputs.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ steps.op.outputs.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ steps.op.outputs.VERCEL_PROJECT_ID }}
        run: |
          set -euo pipefail
          prod_flag=()
          if [[ "$ENVIRONMENT" == "production" ]]; then
            prod_flag=(--prod)
          fi
          url="$(vercel deploy --prebuilt "${prod_flag[@]}" --token="$VERCEL_TOKEN")"
          echo "deployment-url=$url" >> "$GITHUB_OUTPUT"

      - name: Create GitHub deployment record
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # github.sha is the merge commit on pull_request events — the code
          # actually checked out and built, unlike the PR head sha.
          REF: ${{ github.sha }}
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
          ENVIRONMENT: ${{ inputs.environment }}
        run: node .yearn-gha/scripts/create-github-deployment.mjs

      # Keeps a single marker-tagged comment per PR up to date with the
      # latest deployment URL instead of adding one comment per push.
      - name: Comment deployment URL on pull request
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
          ENVIRONMENT: ${{ inputs.environment }}
        run: node .yearn-gha/scripts/comment-deployment-url.mjs
