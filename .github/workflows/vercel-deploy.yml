name: Vercel deploy

on:
  workflow_call:
    inputs:
      project-slug:
        description: Infisical project slug containing VERCEL_PROJECT_ID under /deploy-config.
        required: true
        type: string
      identity-id:
        description: Infisical machine identity ID matching the deploy environment (preview identity for pull requests, production identity for the default branch).
        required: true
        type: string
      preview-env-slug:
        description: Infisical environment slug used for pull request preview deploys.
        required: false
        type: string
        default: dev
      env-slug:
        description: Infisical environment slug used for production deploys.
        required: false
        type: string
        default: prod
    outputs:
      deployment-url:
        description: Preview or production URL returned by Vercel.
        value: ${{ jobs.deploy.outputs.deployment-url }}

env:
  # Shared Infisical project holding VERCEL_TOKEN and VERCEL_ORG_ID under
  # /deploy-config (prod env), used by every app deploy.
  SHARED_PROJECT_SLUG: webops-prod-shared
  # Pull requests deploy previews; any other trigger (push to the default
  # branch) deploys production.
  DEPLOY_ENV: ${{ github.event_name == 'pull_request' && 'preview' || 'production' }}
  INFISICAL_ENV_SLUG: ${{ github.event_name == 'pull_request' && inputs.preview-env-slug || inputs.env-slug }}

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      id-token: write
      pull-requests: write
    outputs:
      deployment-url: ${{ steps.deploy.outputs.preview-url }}
    steps:
      # Fork PRs never receive an OIDC token; fail explicitly instead of
      # letting the Infisical login error obscure the cause.
      - name: Reject fork pull requests
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        run: |
          echo "::error::pull requests from forks cannot deploy (no OIDC token is issued)" >&2
          exit 1

      # Production is documented to require a push to the caller's default
      # branch. Enforce it here so workflow_dispatch, schedule, and
      # non-default-branch pushes can never reach Infisical or deploy --prod.
      - name: Reject non-default-branch production deploys
        if: env.DEPLOY_ENV == 'production' && (github.event_name != 'push' || github.ref != format('refs/heads/{0}', github.event.repository.default_branch))
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          EVENT_NAME: ${{ github.event_name }}
          REF: ${{ github.ref }}
        run: |
          printf '::error::production deploys are only allowed for a push to the default branch (%s); got %s on %s\n' \
            "$DEFAULT_BRANCH" "$EVENT_NAME" "$REF" >&2
          exit 1

      - name: Checkout app repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      # Deploy credentials live alone under /deploy-config: the action exports
      # every secret at the path, so a broader path would pull app secrets
      # onto the runner. App secrets reach Vercel via Infisical secret syncs,
      # never through this workflow.
      - name: Load shared Vercel credentials from Infisical
        uses: Infisical/secrets-action@77ab1f4ccd183a543cb5b42435fbd181189f4995 # v1.0.16
        with:
          method: oidc
          identity-id: ${{ inputs.identity-id }}
          oidc-audience: https://github.com/${{ github.repository_owner }}
          project-slug: ${{ env.SHARED_PROJECT_SLUG }}
          env-slug: prod
          secret-path: /deploy-config
          include-imports: false

      - name: Load Vercel credentials from Infisical
        uses: Infisical/secrets-action@77ab1f4ccd183a543cb5b42435fbd181189f4995 # v1.0.16
        with:
          method: oidc
          identity-id: ${{ inputs.identity-id }}
          oidc-audience: https://github.com/${{ github.repository_owner }}
          project-slug: ${{ inputs.project-slug }}
          env-slug: ${{ env.INFISICAL_ENV_SLUG }}
          secret-path: /deploy-config
          include-imports: false

      - name: Validate Vercel credentials
        run: |
          set -euo pipefail
          for var in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID; do
            if [[ -z "${!var:-}" ]]; then
              echo "::error::${var} must resolve from its configured Infisical project" >&2
              exit 1
            fi
          done

      - name: Deploy to Vercel
        id: deploy
        uses: amondnet/vercel-action@de09aeac2ace6599ec9b11ef87558759a496bac4 # v42.3.0
        with:
          vercel-token: ${{ env.VERCEL_TOKEN }}
          vercel-org-id: ${{ env.VERCEL_ORG_ID }}
          vercel-project-id: ${{ env.VERCEL_PROJECT_ID }}
          vercel-version: 55.0.0
          # CLI mode does not forward `target`; --prod is what promotes the
          # deployment. The build runs on Vercel with its synced env vars.
          vercel-args: ${{ env.DEPLOY_ENV == 'production' && '--prod' || '' }}
          github-token: ${{ github.token }}
          github-comment: true
          github-deployment: true
          github-deployment-environment: ${{ env.DEPLOY_ENV }}
