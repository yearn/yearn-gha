name: Deploy to Vercel

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  deployments: write
  pull-requests: write

jobs:
  deploy:
    uses: yearn/yearn-gha/.github/workflows/vercel-deploy.yml@main
    with:
      vault: webops-prod-fapy-hook
      environment: ${{ github.event_name == 'pull_request' && 'preview' || 'production' }}
      secrets: |
        KONG_SECRET=fapy-hook/KONG_SECRET
        CRV_GAUGE_REGISTRY_URL=fapy-hook/CRV_GAUGE_REGISTRY_URL
        CRV_POOLS_URL=fapy-hook/CRV_POOLS_URL
        RPC_CHAIN_URL_1=fapy-hook/RPC_CHAIN_URL_1
        RPC_CHAIN_URL_10=fapy-hook/RPC_CHAIN_URL_10
        RPC_CHAIN_URL_100=fapy-hook/RPC_CHAIN_URL_100
        RPC_CHAIN_URL_137=fapy-hook/RPC_CHAIN_URL_137
        RPC_CHAIN_URL_146=fapy-hook/RPC_CHAIN_URL_146
        RPC_CHAIN_URL_250=fapy-hook/RPC_CHAIN_URL_250
        RPC_CHAIN_URL_42161=fapy-hook/RPC_CHAIN_URL_42161
        RPC_CHAIN_URL_747474=fapy-hook/RPC_CHAIN_URL_747474
        RPC_CHAIN_URL_80094=fapy-hook/RPC_CHAIN_URL_80094
        RPC_CHAIN_URL_8453=fapy-hook/RPC_CHAIN_URL_8453
    secrets:
      OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
