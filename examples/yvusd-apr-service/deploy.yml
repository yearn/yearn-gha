name: Deploy to Vercel

on:
  push:
    branches: [main]

concurrency:
  group: vercel-production
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write
  pull-requests: write

jobs:
  deploy:
    uses: yearn/yearn-gha/.github/workflows/vercel-deploy.yml@main
    with:
      vault: webops-prod-yvusd-apr-service
      environment: production
      secrets: |
        VERCEL_PROJECT_ID=VERCEL_PROJECT_ID
        ETH_RPC_URL=ETH_RPC_URL
        ARB_RPC_URL=ARB_RPC_URL
        BASE_RPC_URL=BASE_RPC_URL
        KAT_RPC_URL=KAT_RPC_URL
        REDIS_URL=REDIS_URL
        HYPERSYNC_API_TOKEN=HYPERSYNC_API_TOKEN
        KONG_WEBHOOK_SECRET=KONG_WEBHOOK_SECRET
        YVUSD_ADDRESS=YVUSD_ADDRESS
        LOCKED_YVUSD_ADDRESS=LOCKED_YVUSD_ADDRESS
        CRON_SECRET=CRON_SECRET
    secrets:
      OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
